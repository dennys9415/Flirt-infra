services:
  postgres:
    image: postgres:16
    env_file: env/postgres.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  flyway:
    image: flyway/flyway:10
    command: migrate
    env_file: env/flyway.env
    volumes:
      - ../Flirt-api/migrations:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  api:
    build:
      context: ../Flirt-api
      dockerfile: Dockerfile
    env_file: env/api.env
    ports:
      - "3000:3000"
    depends_on:
      flyway:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
